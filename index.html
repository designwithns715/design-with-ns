<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design With NS – Your Satisfaction is our Elevation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
    <style>
        /* ═══════════════════════════════════════════
           THEME TOKENS
        ═══════════════════════════════════════════ */
        :root {
            --green: #5ac83c;
            --green-hover: #6edc4f;
            --green-glow: rgba(90, 200, 60, .35);
            --tt: background .35s ease, color .35s ease, border-color .35s ease, box-shadow .35s ease;
        }

        [data-theme="dark"] {
            --bg: #040f26;
            --bg-section: #081a42;
            --bg-card: #0d2244;
            --bg-alt: #0a1c3a;
            --navy-mid: #163580;
            --border: rgba(90, 200, 60, .18);
            --border-soft: rgba(255, 255, 255, .09);
            --text-h: #ffffff;
            --text-body: #c8d3e8;
            --text-muted: #7a8eaf;
            --nav-bg: rgba(4, 15, 38, .93);
            --shadow: 0 20px 56px rgba(0, 0, 0, .55);
        }

        [data-theme="light"] {
            --bg: #f4f6fb;
            --bg-section: #ffffff;
            --bg-card: #eef2fb;
            --bg-alt: #e6eef8;
            --navy-mid: #163580;
            --border: rgba(13, 45, 107, .16);
            --border-soft: rgba(13, 45, 107, .1);
            --text-h: #0d2d6b;
            --text-body: #334466;
            --text-muted: #6a7fa0;
            --nav-bg: rgba(244, 246, 251, .93);
            --shadow: 0 20px 56px rgba(13, 45, 107, .1);
        }

        /* Reset & Global */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-body); overflow-x: hidden; transition: var(--tt); line-height: 1.6; }
        img { max-width: 100%; display: block; }
        a { text-decoration: none; }
        ul { list-style: none; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }

        /* Navigation */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; height: 70px;
            background: var(--nav-bg); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border); transition: var(--tt);
        }
        .nav-logo { display: flex; align-items: center; gap: 12px; }
        .nav-logo-img { height: 42px; width: auto; border-radius: 6px; transition: opacity 0.3s ease; }
        .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--text-h); }
        .nav-brand span { color: var(--green); }
        
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-muted); font-size: .88rem; font-weight: 500; transition: color .2s; position: relative; }
        .nav-links a:hover { color: var(--green); }
        .nav-links a::after { content:''; position:absolute; bottom:-5px; left:0; width:0; height:2px; background:var(--green); transition:width .3s; }
        .nav-links a:hover::after { width:100%; }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .theme-toggle { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; color: var(--text-h); transition: transform .2s; }
        .theme-toggle svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; }
        .i-sun, .i-moon { display: none; }
        [data-theme="dark"] .i-moon { display: block; }
        [data-theme="light"] .i-sun { display: block; }

        .nav-cta { background: var(--green); color: #040f26; padding: 10px 22px; border-radius: 5px; font-weight: 700; font-size: 0.85rem; }

        /* Sections Shared */
        section { padding: 100px 5%; max-width: 1200px; margin: 0 auto; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-label { color: var(--green); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .section-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); color: var(--text-h); margin-bottom: 15px; }
        .section-sub { color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        /* ════════════ RESUME SECTION STYLES ════════════ */
        #resume {
            background: linear-gradient(135deg, #040f26 0%, #0d2d6b 100%);
            text-align: center; position: relative; overflow: hidden;
            border-radius: 18px; margin-bottom: 40px;
        }
        [data-theme="light"] #resume { background: linear-gradient(135deg, #0d2d6b 0%, #163580 100%); }
        #resume::before {
            content:'CV'; position:absolute; right:-10px; top:50%; transform:translateY(-50%);
            font-family:'Playfair Display',serif; font-size:clamp(7rem,20vw,18rem); font-weight:900;
            color:rgba(255,255,255,.03); line-height:1; pointer-events:none;
        }
        .resume-features { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; margin: 40px 0; }
        .r-feat { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .r-feat-icon {
            width: 54px; height: 54px; border-radius: 13px;
            background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
            display: flex; align-items: center; justify-content: center; transition: all .3s;
        }
        .r-feat:hover .r-feat-icon { background: rgba(90,200,60,.2); border-color: var(--green); transform: translateY(-4px); }
        .r-feat-icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; }
        .r-feat span { font-size: .83rem; font-weight: 500; color: rgba(255,255,255,.58); letter-spacing: .03em; }

        .btn-resume {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--green); color: #081a42;
            padding: 16px 52px; border-radius: 6px; font-size: 1rem;
            font-weight: 700; letter-spacing: .05em;
            box-shadow: 0 6px 28px var(--green-glow); transition: all .22s;
        }
        .btn-resume:hover { background: var(--green-hover); transform: translateY(-3px); box-shadow: 0 12px 36px rgba(90,200,60,.55); }
        .btn-resume svg { width: 19px; height: 19px; stroke: #081a42; fill: none; stroke-width: 2.2; }

        /* Reveal Animations */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .nav-links, .nav-cta { display: none; }
            .about-inner { grid-template-columns: 1fr; }
            .resume-features { gap: 20px; }
        }
    </style>
</head>
<body>

<nav id="mainNav">
    <a href="#home" class="nav-logo">
        <img src="Design_With_NS_Logo_Dark.png" alt="Design With NS" id="siteLogo" class="nav-logo-img" />
        <div class="nav-brand">Design With <span>NS</span></div>
    </a>

    <ul class="nav-links">
        <li><a href="#services">Services</a></li>
        <li><a href="#resume">Resume</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#quote">Contact</a></li>
    </ul>

    <div class="nav-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
            <svg class="i-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <a href="#quote" class="nav-cta">Get a Quote</a>
    </div>
</nav>

<!-- HERO & SERVICES SECTIONS REMAIN AS PREVIOUSLY DEFINED -->

<!-- ════════════ RESUME SECTION ════════════ -->
<section id="resume">
    <div style="position:relative;z-index:2">
      <div class="section-label reveal">Career Tools</div>
      <h2 class="section-title reveal" style="color:#fff">Resume Building</h2>
      <p class="section-sub reveal" style="margin:0 auto 46px; color:rgba(255,255,255,0.7);">
        Stand out with a professionally crafted resume that gets you noticed. Tell us about yourself and we'll handle the rest.
      </p>
  
      <div class="resume-features">
        <div class="r-feat reveal">
          <div class="r-feat-icon">
            <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><circle cx="11" cy="11" r="2"/></svg>
          </div>
          <span>Custom Design</span>
        </div>
        <div class="r-feat reveal">
          <div class="r-feat-icon">
            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <span>ATS-Friendly</span>
        </div>
        <div class="r-feat reveal">
          <div class="r-feat-icon">
            <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <span>Quick Turnaround</span>
        </div>
        <div class="r-feat reveal">
          <div class="r-feat-icon">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <span>All Industries</span>
        </div>
      </div>
  
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScu3TdtbRWjVq7Zvr9dYx7VO1sENXJidSBub2mKws3Nh28nWQ/viewform?usp=sharing&ouid=104419270268078942259"
         target="_blank" rel="noopener" class="btn-resume reveal">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Get Your Resume
      </a>
    </div>
</section>

<!-- ABOUT, QUOTE & FOOTER SECTIONS REMAIN AS PREVIOUSLY DEFINED -->

<script>
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const siteLogo = document.getElementById('siteLogo');

    const lightLogo = "Design_With_NS_Logo.png";
    const darkLogo = "Design_With_NS_Logo_Dark.png";

    function updateLogo(theme) {
        siteLogo.src = theme === 'dark' ? darkLogo : lightLogo;
    }

    themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('dns-theme', newTheme);
        updateLogo(newTheme);
    });

    const savedTheme = localStorage.getItem('dns-theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    updateLogo(savedTheme);

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
