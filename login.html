<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – Design With NS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#5ac83c;--green-hover:#6edc4f;--green-glow:rgba(90,200,60,.35);--tt:background .35s ease,color .35s ease,border-color .35s ease;}
[data-theme="dark"]{--bg:#040f26;--bg-card:#0d2244;--bg-input:#0a1c3a;--border:rgba(90,200,60,.18);--border-soft:rgba(255,255,255,.09);--text-h:#ffffff;--text-body:#c8d3e8;--text-muted:#7a8eaf;--nav-bg:rgba(4,15,38,.95);--shadow:0 24px 64px rgba(0,0,0,.6);}
[data-theme="light"]{--bg:#f4f6fb;--bg-card:#ffffff;--bg-input:#eef2fb;--border:rgba(13,45,107,.16);--border-soft:rgba(13,45,107,.1);--text-h:#0d2d6b;--text-body:#334466;--text-muted:#6a7fa0;--nav-bg:rgba(244,246,251,.95);--shadow:0 24px 64px rgba(13,45,107,.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-body);min-height:100vh;display:flex;flex-direction:column;transition:var(--tt);overflow-x:hidden}
a{text-decoration:none}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:var(--nav-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:var(--tt);}
.nav-logo{display:flex;align-items:center;gap:12px}
.nav-logo img{height:44px;width:44px;object-fit:contain;border-radius:6px}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.08rem;font-weight:700;color:var(--text-h)}
.nav-brand span{color:var(--green)}
.logo-dark{display:block}.logo-light{display:none}
[data-theme="light"] .logo-dark{display:none}[data-theme="light"] .logo-light{display:block}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-mode{display:flex;align-items:center;gap:7px;color:var(--text-muted);font-size:.85rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border-soft);background:none;padding:6px 12px;border-radius:6px;transition:color .2s,border-color .2s;}
.nav-mode:hover{color:var(--green);border-color:var(--green)}
.nav-mode svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.i-sun,.i-moon{display:none}
[data-theme="dark"] .i-moon{display:block}[data-theme="light"] .i-sun{display:block}
.btn-nav-signup{background:var(--green);color:#081a42;padding:8px 18px;border-radius:5px;font-size:.85rem;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:background .2s,transform .15s;}
.btn-nav-signup:hover{background:var(--green-hover);transform:translateY(-1px)}
.btn-nav-signup svg{width:13px;height:13px;stroke:#081a42;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}

/* CARD */
.auth-card{background:var(--bg-card);border:1.5px solid var(--border-soft);border-radius:22px;width:100%;max-width:460px;padding:44px 48px;box-shadow:var(--shadow);transition:var(--tt);}

/* LOGO */
.card-logo{text-align:center;margin-bottom:28px}
.card-logo img{height:68px;width:68px;object-fit:contain;border-radius:10px;margin:0 auto 12px}
.card-logo h1{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:900;color:var(--text-h)}
.card-logo h1 span{color:var(--green)}
.card-logo p{font-size:.83rem;color:var(--text-muted);margin-top:4px}

/* ROLE TABS */
.role-tabs{display:flex;border:1.5px solid var(--border-soft);border-radius:8px;overflow:hidden;margin-bottom:22px}
.role-tab{flex:1;padding:10px;font-size:.86rem;font-weight:600;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--text-muted);transition:all .2s;letter-spacing:.04em;}
.role-tab.active{background:var(--green);color:#081a42}
.role-tab:not(.active):hover{color:var(--green)}

/* ADMIN BADGE */
.admin-badge{display:none;align-items:center;gap:8px;padding:9px 13px;background:rgba(90,200,60,.08);border:1px solid rgba(90,200,60,.22);border-radius:7px;font-size:.8rem;color:var(--green);font-weight:600;margin-bottom:10px;}
.admin-badge svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* MESSAGES */
.msg{padding:10px 13px;border-radius:7px;font-size:.82rem;font-weight:500;display:none;align-items:center;gap:9px;margin-bottom:14px;}
.msg.error{background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.25);color:#e05555}
.msg.success{background:rgba(90,200,60,.1);border:1px solid rgba(90,200,60,.25);color:#3ea828}
.msg svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* FORM */
.auth-form{display:flex;flex-direction:column;gap:18px}
.fg{display:flex;flex-direction:column;gap:7px}
.fg label{font-size:.74rem;font-weight:700;color:var(--text-h);letter-spacing:.07em;text-transform:uppercase}
.fg input{border:1.5px solid var(--border-soft);border-radius:8px;padding:12px 16px;font-size:.93rem;font-family:'DM Sans',sans-serif;color:var(--text-h);background:var(--bg-input);outline:none;transition:border-color .2s,box-shadow .2s,background .35s,color .35s;width:100%;}
.fg input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(90,200,60,.12)}
.fg input::placeholder{color:var(--text-muted)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;transition:color .2s;padding:2px;}
.pw-eye:hover{color:var(--green)}
.pw-eye svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.forgot{font-size:.78rem;color:var(--green);text-align:right;cursor:pointer;transition:opacity .2s;margin-top:-10px;}
.forgot:hover{opacity:.75}

/* SUBMIT */
.btn-submit{background:var(--green);color:#081a42;padding:13px;border-radius:8px;font-size:.95rem;font-weight:700;letter-spacing:.05em;border:none;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 20px var(--green-glow);width:100%;}
.btn-submit svg{width:16px;height:16px;stroke:#081a42;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.btn-submit:hover{background:var(--green-hover);transform:translateY(-2px);box-shadow:0 8px 28px rgba(90,200,60,.45)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* DIVIDER + LINKS */
.divider{display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:.76rem;margin:4px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-soft)}
.link-row{text-align:center;font-size:.82rem;color:var(--text-muted)}
.link-row a{color:var(--green);font-weight:600}
.link-row a:hover{text-decoration:underline}

/* FOOTER */
footer{background:#020a1a;padding:20px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-copy{color:#7a8eaf;font-size:.78rem;letter-spacing:.04em}
.footer-copy strong{color:var(--green)}
.footer-social{display:flex;gap:18px}
.social-link{display:flex;align-items:center;gap:7px;color:#7a8eaf;font-size:.78rem;font-weight:500;transition:color .2s}
.social-link:hover{color:var(--green)}
.social-link svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media(max-width:600px){
  nav{padding:0 20px;height:60px}
  .auth-card{padding:32px 22px}
  footer{padding:16px 20px;flex-direction:column;align-items:center;text-align:center}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="Design_With_NS_Logo_Dark.png" alt="Design With NS" class="logo-dark"/>
    <img src="Design_With_NS_Logo.png"      alt="Design With NS" class="logo-light"/>
    <div class="nav-brand">Design With <span>NS</span></div>
  </a>
  <div class="nav-right">
    <button class="nav-mode" id="modeBtn" aria-label="Toggle theme">
      <svg class="i-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      Mode
    </button>
    <a href="signup.html" class="btn-nav-signup">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Sign Up
    </a>
  </div>
</nav>

<main>
  <div class="auth-card">

    <div class="card-logo">
      <img src="Design_With_NS_Logo_Dark.png" alt="Design With NS" class="logo-dark"/>
      <img src="Design_With_NS_Logo.png"      alt="Design With NS" class="logo-light"/>
      <h1>Design With <span>NS</span></h1>
      <p id="loginSubtitle">Welcome back — sign in to continue</p>
    </div>

    <!-- Role Tabs -->
    <div class="role-tabs">
      <button class="role-tab active" id="roleUser"  onclick="switchRole('user')">User</button>
      <button class="role-tab"        id="roleAdmin" onclick="switchRole('admin')">Admin</button>
    </div>

    <!-- Admin Badge -->
    <div class="admin-badge" id="adminBadge">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin access — elevated permissions required
    </div>

    <!-- Messages -->
    <div class="msg error"   id="loginErr"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="loginErrTxt"></span></div>
    <div class="msg success" id="loginOk"> <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="loginOkTxt"></span></div>

    <!-- Form -->
    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="fg">
        <label for="lEmail">Email Address</label>
        <input type="email" id="lEmail" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="fg">
        <label for="lPass">Password</label>
        <div class="pw-wrap">
          <input type="password" id="lPass" placeholder="Enter your password" required autocomplete="current-password"/>
          <button type="button" class="pw-eye" onclick="togglePw('lPass',this)" aria-label="Show/hide">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <a class="forgot" onclick="forgotPassword()">Forgot password?</a>
      <button type="submit" class="btn-submit" id="loginBtn">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span id="loginBtnTxt">Sign In</span>
      </button>
      <div class="divider">or</div>
      <div class="link-row">Don't have an account? <a href="signup.html">Sign Up</a></div>
      <div class="link-row"><a href="index.html">← Back to website</a></div>
    </form>

  </div>
</main>

<footer>
  <div class="footer-copy">&copy; 2025 <strong>Design With NS</strong>. All rights reserved.</div>
  <div class="footer-social">
    <a href="https://www.instagram.com/design.with.ns/" target="_blank" rel="noopener" class="social-link">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>Instagram
    </a>
    <a href="https://www.linkedin.com/company/design-with-ns/" target="_blank" rel="noopener" class="social-link">
      <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>LinkedIn
    </a>
  </div>
</footer>

<script>
/* ── Theme ── */
const root = document.documentElement;
(function(){
  const s = localStorage.getItem('dns-theme');
  root.setAttribute('data-theme', s || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
})();
document.getElementById('modeBtn').addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('dns-theme', next);
});

/* ── User store ── */
function getUsers(){ try{ return JSON.parse(localStorage.getItem('dns_users')||'[]'); }catch{ return []; } }
function hashPass(s){ let h=0; for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;} return h.toString(36); }
function findUser(email){ return getUsers().find(u=>u.email.toLowerCase()===email.toLowerCase()); }

/* ── Role switch ── */
let currentRole = 'user';
function switchRole(role){
  currentRole = role;
  document.getElementById('roleUser').classList.toggle('active', role==='user');
  document.getElementById('roleAdmin').classList.toggle('active', role==='admin');
  document.getElementById('adminBadge').style.display = role==='admin' ? 'flex' : 'none';
  document.getElementById('loginBtnTxt').textContent = role==='admin' ? 'Admin Sign In' : 'Sign In';
  document.getElementById('loginSubtitle').textContent = role==='admin' ? 'Admin portal — enter your credentials' : 'Welcome back — sign in to continue';
  hideMsg();
}

/* ── Messages ── */
function hideMsg(){ ['loginErr','loginOk'].forEach(id=>{ document.getElementById(id).style.display='none'; }); }
function showErr(txt){ hideMsg(); document.getElementById('loginErrTxt').textContent=txt; const el=document.getElementById('loginErr'); el.style.display='flex'; el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
function showOk(txt){  hideMsg(); document.getElementById('loginOkTxt').textContent=txt;  document.getElementById('loginOk').style.display='flex'; }

/* ── Password toggle ── */
function togglePw(id, btn){
  const inp = document.getElementById(id);
  const show = inp.type==='text';
  inp.type = show ? 'password' : 'text';
  btn.innerHTML = show
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

/* ── Login ── */
function handleLogin(e){
  e.preventDefault();
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const btn   = document.getElementById('loginBtn');
  if(!email||!pass){ showErr('Please fill in all fields.'); return; }
  btn.disabled=true;
  document.getElementById('loginBtnTxt').textContent='Signing in…';
  setTimeout(()=>{
    btn.disabled=false;
    document.getElementById('loginBtnTxt').textContent = currentRole==='admin' ? 'Admin Sign In' : 'Sign In';
    if(currentRole==='admin'){
      if(email==='admin@designwithns.com' && pass==='admin123'){
        showOk('Admin access granted. Redirecting…');
        setTimeout(()=>window.location.href='index.html',1500);
      } else { showErr('Invalid admin credentials.'); }
      return;
    }
    const user = findUser(email);
    if(!user){ showErr('No account found. Please sign up first.'); return; }
    if(user.passwordHash !== hashPass(pass)){ showErr('Incorrect password. Please try again.'); return; }
    showOk(`Welcome back, ${user.firstName}! Redirecting…`);
    localStorage.setItem('dns_session', JSON.stringify({id:user.id, name:user.firstName}));
    setTimeout(()=>window.location.href='index.html',1500);
  },800);
}

/* ── Forgot password ── */
function forgotPassword(){
  const email = document.getElementById('lEmail').value.trim();
  if(!email){ showErr('Enter your email above first.'); document.getElementById('lEmail').focus(); return; }
  const user = findUser(email);
  if(!user && currentRole==='user'){ showErr('No account found with that email.'); return; }
  showOk(`Password reset instructions sent to ${email}`);
}

/* ── Pre-fill email if coming from signup ── */
const params = new URLSearchParams(window.location.search);
if(params.get('email')) document.getElementById('lEmail').value = decodeURIComponent(params.get('email'));
if(params.get('msg'))   showOk(decodeURIComponent(params.get('msg')));
</script>
</body>
</html>
