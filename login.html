<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login / Sign Up – Design With NS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet"/>
<style>
/* ── THEME TOKENS ── */
:root{
  --green:#5ac83c;--green-hover:#6edc4f;--green-glow:rgba(90,200,60,.35);
  --tt:background .35s ease,color .35s ease,border-color .35s ease;
}
[data-theme="dark"]{
  --bg:#040f26;--bg-card:#0d2244;--bg-input:#0a1c3a;
  --border:rgba(90,200,60,.18);--border-soft:rgba(255,255,255,.09);
  --text-h:#ffffff;--text-body:#c8d3e8;--text-muted:#7a8eaf;
  --nav-bg:rgba(4,15,38,.95);--shadow:0 24px 64px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f4f6fb;--bg-card:#ffffff;--bg-input:#eef2fb;
  --border:rgba(13,45,107,.16);--border-soft:rgba(13,45,107,.1);
  --text-h:#0d2d6b;--text-body:#334466;--text-muted:#6a7fa0;
  --nav-bg:rgba(244,246,251,.95);--shadow:0 24px 64px rgba(13,45,107,.12);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-body);min-height:100vh;display:flex;flex-direction:column;transition:var(--tt);overflow-x:hidden}
a{text-decoration:none}

/* ── NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:68px;
  background:var(--nav-bg);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);transition:var(--tt);
}
.nav-logo{display:flex;align-items:center;gap:12px}
.nav-logo img{height:44px;width:44px;object-fit:contain;border-radius:6px}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.08rem;font-weight:700;color:var(--text-h)}
.nav-brand span{color:var(--green)}
.logo-dark{display:block}.logo-light{display:none}
[data-theme="light"] .logo-dark{display:none}
[data-theme="light"] .logo-light{display:block}

.nav-mode{
  display:flex;align-items:center;gap:7px;color:var(--text-muted);
  font-size:.85rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border-soft);
  background:none;padding:6px 12px;border-radius:6px;transition:color .2s,border-color .2s;
}
.nav-mode:hover{color:var(--green);border-color:var(--green)}
.nav-mode svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.i-sun,.i-moon{display:none}
[data-theme="dark"] .i-moon{display:block}
[data-theme="light"] .i-sun{display:block}

/* ── MAIN ── */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}

/* ── CARD ── */
.auth-card{
  background:var(--bg-card);border:1.5px solid var(--border-soft);
  border-radius:22px;width:100%;max-width:500px;
  box-shadow:var(--shadow);overflow:hidden;transition:var(--tt);
}

/* ── VIEW SWITCHER (Login / Sign Up tabs) ── */
.view-tabs{display:flex;border-bottom:1.5px solid var(--border-soft)}
.view-tab{
  flex:1;padding:16px;font-size:.9rem;font-weight:700;letter-spacing:.05em;
  text-align:center;cursor:pointer;background:none;border:none;
  color:var(--text-muted);position:relative;transition:color .2s;
}
.view-tab::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:2.5px;
  background:var(--green);transform:scaleX(0);transition:transform .3s cubic-bezier(.23,1.12,.58,1);
}
.view-tab.active{color:var(--green)}
.view-tab.active::after{transform:scaleX(1)}
.view-tab:not(.active):hover{color:var(--text-h)}

/* ── PANELS ── */
.panels{
  display:grid;grid-template-columns:1fr 1fr;
  transition:transform .4s cubic-bezier(.23,1.12,.58,1);
  width:200%;
}
.panels.show-signup{transform:translateX(-50%)}
.panel{width:50%;padding:36px 44px 40px;min-width:0}

/* ── LOGO HEADER ── */
.card-logo{text-align:center;margin-bottom:24px}
.card-logo img{height:64px;width:64px;object-fit:contain;border-radius:10px;margin:0 auto 10px}
.card-logo h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--text-h)}
.card-logo h2 span{color:var(--green)}
.card-logo p{font-size:.83rem;color:var(--text-muted);margin-top:3px}

/* ── ROLE TABS (login only) ── */
.role-tabs{display:flex;border:1.5px solid var(--border-soft);border-radius:8px;overflow:hidden;margin-bottom:22px}
.role-tab{
  flex:1;padding:9px;font-size:.85rem;font-weight:600;text-align:center;
  cursor:pointer;background:transparent;border:none;color:var(--text-muted);
  transition:all .2s;letter-spacing:.04em;
}
.role-tab.active{background:var(--green);color:#081a42}
.role-tab:not(.active):hover{color:var(--green)}

/* ── ADMIN BADGE ── */
.admin-badge{
  display:none;align-items:center;gap:8px;padding:9px 13px;
  background:rgba(90,200,60,.08);border:1px solid rgba(90,200,60,.22);
  border-radius:7px;font-size:.8rem;color:var(--green);font-weight:600;margin-bottom:6px;
}
.admin-badge svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ── MESSAGES ── */
.msg{
  padding:10px 13px;border-radius:7px;font-size:.82rem;font-weight:500;
  display:none;align-items:center;gap:9px;margin-bottom:14px;
}
.msg.error{background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.25);color:#e05555}
.msg.success{background:rgba(90,200,60,.1);border:1px solid rgba(90,200,60,.25);color:#3ea828}
.msg svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ── FORM ── */
.auth-form{display:flex;flex-direction:column;gap:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:.74rem;font-weight:700;color:var(--text-h);letter-spacing:.07em;text-transform:uppercase}
.fg input,.fg select{
  border:1.5px solid var(--border-soft);border-radius:8px;
  padding:12px 16px;font-size:.92rem;font-family:'DM Sans',sans-serif;
  color:var(--text-h);background:var(--bg-input);outline:none;
  transition:border-color .2s,box-shadow .2s,background .35s,color .35s;width:100%;
}
.fg input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(90,200,60,.12)}
.fg input::placeholder{color:var(--text-muted)}

.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Password input with toggle */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-eye{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  display:flex;align-items:center;transition:color .2s;padding:2px;
}
.pw-eye:hover{color:var(--green)}
.pw-eye svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Password strength bar */
.strength-wrap{margin-top:6px;display:none}
.strength-bar{height:4px;border-radius:4px;background:var(--border-soft);overflow:hidden}
.strength-fill{height:100%;border-radius:4px;width:0;transition:width .3s,background .3s}
.strength-label{font-size:.72rem;color:var(--text-muted);margin-top:4px}

/* Checkbox */
.fg-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.fg-check input[type="checkbox"]{width:16px;height:16px;margin-top:2px;accent-color:var(--green);flex-shrink:0;cursor:pointer}
.fg-check span{font-size:.8rem;color:var(--text-muted);line-height:1.5}
.fg-check a{color:var(--green);font-weight:600}
.fg-check a:hover{text-decoration:underline}

.forgot{font-size:.78rem;color:var(--green);text-align:right;cursor:pointer;transition:opacity .2s;margin-top:-8px}
.forgot:hover{opacity:.75}

/* Submit button */
.btn-submit{
  background:var(--green);color:#081a42;padding:13px;border-radius:8px;
  font-size:.95rem;font-weight:700;letter-spacing:.05em;border:none;
  cursor:pointer;transition:all .22s;
  display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 20px var(--green-glow);margin-top:2px;width:100%;
}
.btn-submit svg{width:16px;height:16px;stroke:#081a42;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.btn-submit:hover{background:var(--green-hover);transform:translateY(-2px);box-shadow:0 8px 28px rgba(90,200,60,.45)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:.76rem;margin:2px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-soft)}

.back-home{text-align:center;font-size:.8rem;color:var(--text-muted)}
.back-home a{color:var(--green);font-weight:600}
.back-home a:hover{text-decoration:underline}

/* Users registered badge */
.user-count{
  display:flex;align-items:center;gap:7px;padding:9px 13px;
  background:rgba(22,53,128,.15);border:1px solid var(--border-soft);
  border-radius:7px;font-size:.8rem;color:var(--text-muted);margin-bottom:6px;
}
.user-count svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.user-count strong{color:var(--green)}

/* ── FOOTER ── */
footer{
  background:#020a1a;padding:20px 48px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.footer-copy{color:#7a8eaf;font-size:.78rem;letter-spacing:.04em}
.footer-copy strong{color:var(--green)}
.footer-social{display:flex;gap:18px}
.social-link{display:flex;align-items:center;gap:7px;color:#7a8eaf;font-size:.78rem;font-weight:500;transition:color .2s}
.social-link:hover{color:var(--green)}
.social-link svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── SIGNUP METHOD SELECTOR ── */
.method-label{font-size:.74rem;font-weight:700;color:var(--text-h);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:block}
.method-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.method-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  padding:14px 8px;border-radius:10px;cursor:pointer;
  border:1.5px solid var(--border-soft);background:var(--bg-input);
  color:var(--text-muted);font-size:.78rem;font-weight:600;letter-spacing:.04em;
  transition:all .22s;
}
.method-btn svg{width:22px;height:22px;flex-shrink:0}
.method-btn:hover{border-color:var(--green);color:var(--green);background:rgba(90,200,60,.05);transform:translateY(-2px)}
.method-btn.active{border-color:var(--green);background:rgba(90,200,60,.08);color:var(--green)}

/* Phone OTP */
.otp-row{display:flex;gap:10px;align-items:center}
.otp-row input[type="tel"]{flex:1}
.btn-send-otp{
  background:var(--green);color:#081a42;border:none;border-radius:8px;
  padding:12px 14px;font-size:.8rem;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:all .2s;flex-shrink:0;letter-spacing:.03em;
}
.btn-send-otp:hover{background:var(--green-hover);transform:translateY(-1px)}
.btn-send-otp:disabled{opacity:.55;cursor:not-allowed;transform:none}
.otp-inputs{display:flex;gap:10px;justify-content:center;margin-top:4px}
.otp-inputs input{
  width:46px;height:52px;text-align:center;font-size:1.3rem;font-weight:700;
  border:1.5px solid var(--border-soft);border-radius:8px;
  background:var(--bg-input);color:var(--text-h);outline:none;
  transition:border-color .2s,box-shadow .2s;padding:0;
}
.otp-inputs input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(90,200,60,.12)}

/* Google info */
.google-info{
  background:rgba(66,133,244,.07);border:1px solid rgba(66,133,244,.22);
  border-radius:8px;padding:14px 16px;font-size:.82rem;color:var(--text-body);line-height:1.6;
}
.google-info strong{color:var(--text-h)}
.google-info .g-note{font-size:.75rem;color:var(--text-muted);margin-top:6px}
.btn-google-signup{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:13px;border-radius:8px;border:1.5px solid var(--border-soft);
  background:var(--bg-input);color:var(--text-h);font-size:.93rem;
  font-weight:600;cursor:pointer;transition:all .22s;margin-top:6px;font-family:'DM Sans',sans-serif;
}
.btn-google-signup:hover{border-color:rgba(66,133,244,.5);background:rgba(66,133,244,.06);transform:translateY(-1px)}
.btn-google-signup svg{width:20px;height:20px;flex-shrink:0}

/* Sub-forms visibility */
.signup-subform{display:none;flex-direction:column;gap:16px}
.signup-subform.active{display:flex}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  nav{padding:0 20px;height:60px}
  .panel{padding:28px 20px 32px}
  .fg-row{grid-template-columns:1fr}
  .method-btns{gap:8px}
  .method-btn{padding:12px 6px;font-size:.72rem}
  footer{padding:16px 20px;flex-direction:column;align-items:center;text-align:center}
}</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="Design_With_NS_Logo_Dark.png" alt="Design With NS" class="logo-dark"/>
    <img src="Design_With_NS_Logo.png"      alt="Design With NS" class="logo-light"/>
    <div class="nav-brand">Design With <span>NS</span></div>
  </a>
  <button class="nav-mode" id="modeBtn" aria-label="Toggle theme">
    <svg class="i-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    Mode
  </button>
</nav>

<!-- MAIN -->
<main>
  <div class="auth-card">

    <!-- Top tabs: Login / Sign Up -->
    <div class="view-tabs">
      <button class="view-tab active" id="tabLogin" onclick="showView('login')">Sign In</button>
      <button class="view-tab" id="tabSignup" onclick="showView('signup')">Create Account</button>
    </div>

    <!-- Sliding panels wrapper -->
    <div class="panels" id="panels">

      <!-- ══════════ LOGIN PANEL ══════════ -->
      <div class="panel" id="panelLogin">
        <div class="card-logo">
          <img src="Design_With_NS_Logo_Dark.png" alt="Design With NS" class="logo-dark"/>
          <img src="Design_With_NS_Logo.png"      alt="Design With NS" class="logo-light"/>
          <h2>Design With <span>NS</span></h2>
          <p id="loginSubtitle">Welcome back — sign in to continue</p>
        </div>

        <!-- Role tabs -->
        <div class="role-tabs">
          <button class="role-tab active" id="roleUser"  onclick="switchRole('user')">User</button>
          <button class="role-tab"        id="roleAdmin" onclick="switchRole('admin')">Admin</button>
        </div>

        <!-- Admin badge -->
        <div class="admin-badge" id="adminBadge">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Admin access — elevated permissions required
        </div>

        <!-- Messages -->
        <div class="msg error"   id="loginErr"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="loginErrTxt"></span></div>
        <div class="msg success" id="loginOk"> <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="loginOkTxt"></span></div>

        <!-- Form -->
        <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
          <div class="fg">
            <label for="lEmail">Email Address</label>
            <input type="email" id="lEmail" placeholder="you@example.com" required autocomplete="email"/>
          </div>
          <div class="fg">
            <label for="lPass">Password</label>
            <div class="pw-wrap">
              <input type="password" id="lPass" placeholder="Enter your password" required autocomplete="current-password"/>
              <button type="button" class="pw-eye" onclick="togglePw('lPass',this)" aria-label="Show/hide">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <a class="forgot" onclick="forgotPassword()">Forgot password?</a>
          <button type="submit" class="btn-submit" id="loginBtn">
            <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            <span id="loginBtnTxt">Sign In</span>
          </button>
          <div class="divider">or</div>
          <div class="back-home"><a href="index.html">← Back to website</a></div>
        </form>
      </div><!-- /login panel -->

      <!-- ══════════ SIGN UP PANEL ══════════ -->
      <div class="panel" id="panelSignup">
        <div class="card-logo">
          <img src="Design_With_NS_Logo_Dark.png" alt="Design With NS" class="logo-dark"/>
          <img src="Design_With_NS_Logo.png"      alt="Design With NS" class="logo-light"/>
          <h2>Design With <span>NS</span></h2>
          <p>Create your free account</p>
        </div>

        <!-- Registered user count badge -->
        <div class="user-count" id="userCountBadge">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span><strong id="regCount">0</strong> users registered</span>
        </div>

        <!-- Messages -->
        <div class="msg error"   id="signupErr"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="signupErrTxt"></span></div>
        <div class="msg success" id="signupOk"> <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="signupOkTxt"></span></div>

        <!-- Form -->
        <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
          <div class="fg-row">
            <div class="fg">
              <label for="sFirst">First Name</label>
              <input type="text" id="sFirst" placeholder="e.g. Priya" required autocomplete="given-name"/>
            </div>
            <div class="fg">
              <label for="sLast">Last Name</label>
              <input type="text" id="sLast" placeholder="e.g. Sharma" required autocomplete="family-name"/>
            </div>
          </div>
          <div class="fg">
            <label for="sEmail">Email Address</label>
            <input type="email" id="sEmail" placeholder="you@example.com" required autocomplete="email"/>
          </div>
          <div class="fg">
            <label for="sPhone">Phone Number <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></label>
            <input type="tel" id="sPhone" placeholder="+91 00000 00000" autocomplete="tel"/>
          </div>
          <div class="fg">
            <label for="sPass">Password</label>
            <div class="pw-wrap">
              <input type="password" id="sPass" placeholder="Min. 8 characters" required autocomplete="new-password" oninput="checkStrength(this.value)"/>
              <button type="button" class="pw-eye" onclick="togglePw('sPass',this)" aria-label="Show/hide">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="strength-wrap" id="strengthWrap">
              <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
              <div class="strength-label" id="strengthLabel"></div>
            </div>
          </div>
          <div class="fg">
            <label for="sConfirm">Confirm Password</label>
            <div class="pw-wrap">
              <input type="password" id="sConfirm" placeholder="Re-enter your password" required autocomplete="new-password"/>
              <button type="button" class="pw-eye" onclick="togglePw('sConfirm',this)" aria-label="Show/hide">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <label class="fg-check">
            <input type="checkbox" id="sTerms" required/>
            <span>I agree to the <a href="#" onclick="return false">Terms of Service</a> and <a href="#" onclick="return false">Privacy Policy</a></span>
          </label>
          <button type="submit" class="btn-submit" id="signupBtn">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            <span id="signupBtnTxt">Create Account</span>
          </button>
          <div class="divider">or</div>
          <div class="back-home"><a href="index.html">← Back to website</a></div>
        </form>
      </div><!-- /signup panel -->

    </div><!-- /panels -->
  </div><!-- /auth-card -->
</main>

<script>
/* ════════════════════════════════════
   THEME
════════════════════════════════════ */
const root = document.documentElement;
(function(){
  const s = localStorage.getItem('dns-theme');
  root.setAttribute('data-theme', s || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
})();
document.getElementById('modeBtn').addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('dns-theme', next);
});

/* ════════════════════════════════════
   USER STORE  (localStorage)
   Schema: dns_users = [{ id, firstName, lastName, email, phone, passwordHash, createdAt }]
════════════════════════════════════ */
function getUsers() {
  try { return JSON.parse(localStorage.getItem('dns_users') || '[]'); } catch { return []; }
}
function saveUsers(arr) {
  localStorage.setItem('dns_users', JSON.stringify(arr));
}
// Simple hash (not cryptographic — for demo only; use bcrypt on a real backend)
function hashPass(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = Math.imul(31, h) + str.charCodeAt(i) | 0; }
  return h.toString(36);
}
function findUser(email) {
  return getUsers().find(u => u.email.toLowerCase() === email.toLowerCase());
}
function updateRegCount() {
  const n = getUsers().length;
  const el = document.getElementById('regCount');
  if (el) el.textContent = n;
}
updateRegCount();

/* ════════════════════════════════════
   VIEW SWITCH  (Login ↔ Sign Up)
════════════════════════════════════ */
function showView(view) {
  const panels = document.getElementById('panels');
  panels.classList.toggle('show-signup', view === 'signup');
  document.getElementById('tabLogin').classList.toggle('active', view === 'login');
  document.getElementById('tabSignup').classList.toggle('active', view === 'signup');
  hideAll();
}

/* ════════════════════════════════════
   ROLE SWITCH  (User / Admin)
════════════════════════════════════ */
let currentRole = 'user';
function switchRole(role) {
  currentRole = role;
  document.getElementById('roleUser').classList.toggle('active',  role === 'user');
  document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
  const badge = document.getElementById('adminBadge');
  badge.style.display = role === 'admin' ? 'flex' : 'none';
  document.getElementById('loginBtnTxt').textContent = role === 'admin' ? 'Admin Sign In' : 'Sign In';
  document.getElementById('loginSubtitle').textContent =
    role === 'admin' ? 'Admin portal — enter your credentials' : 'Welcome back — sign in to continue';
  hideAll();
}

/* ════════════════════════════════════
   MESSAGES
════════════════════════════════════ */
function hideAll() {
  ['loginErr','loginOk','signupErr','signupOk'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}
function showMsg(id, txtId, txt) {
  hideAll();
  document.getElementById(txtId).textContent = txt;
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ════════════════════════════════════
   PASSWORD TOGGLE
════════════════════════════════════ */
function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  // swap eye icon
  btn.innerHTML = showing
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

/* ════════════════════════════════════
   PASSWORD STRENGTH
════════════════════════════════════ */
function checkStrength(val) {
  const wrap  = document.getElementById('strengthWrap');
  const fill  = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  if (!val) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  let score = 0;
  if (val.length >= 8)               score++;
  if (val.length >= 12)              score++;
  if (/[A-Z]/.test(val))             score++;
  if (/[0-9]/.test(val))             score++;
  if (/[^A-Za-z0-9]/.test(val))      score++;

  const levels = [
    { pct: '20%', color: '#e05555', text: 'Very weak' },
    { pct: '40%', color: '#e07a30', text: 'Weak' },
    { pct: '60%', color: '#e0c030', text: 'Fair' },
    { pct: '80%', color: '#5ac83c', text: 'Strong' },
    { pct: '100%',color: '#3ea828', text: 'Very strong' },
  ];
  const lvl = levels[Math.min(score - 1, 4)] || levels[0];
  fill.style.width    = lvl.pct;
  fill.style.background = lvl.color;
  label.textContent   = lvl.text;
  label.style.color   = lvl.color;
}

/* ════════════════════════════════════
   LOGIN HANDLER
════════════════════════════════════ */
function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const btn   = document.getElementById('loginBtn');

  if (!email || !pass) { showMsg('loginErr','loginErrTxt','Please fill in all fields.'); return; }

  // Loading
  btn.disabled = true;
  document.getElementById('loginBtnTxt').textContent = 'Signing in…';

  setTimeout(() => {
    btn.disabled = false;
    document.getElementById('loginBtnTxt').textContent = currentRole === 'admin' ? 'Admin Sign In' : 'Sign In';

    if (currentRole === 'admin') {
      // Hardcoded admin credentials — replace with real backend auth
      if (email === 'admin@designwithns.com' && pass === 'admin123') {
        showMsg('loginOk','loginOkTxt','Admin access granted. Redirecting…');
        setTimeout(() => window.location.href = 'index.html', 1500);
      } else {
        showMsg('loginErr','loginErrTxt','Invalid admin credentials.');
      }
      return;
    }

    // User login — check localStorage store
    const user = findUser(email);
    if (!user) {
      showMsg('loginErr','loginErrTxt','No account found with that email. Please sign up first.');
      return;
    }
    if (user.passwordHash !== hashPass(pass)) {
      showMsg('loginErr','loginErrTxt','Incorrect password. Please try again.');
      return;
    }
    showMsg('loginOk','loginOkTxt',`Welcome back, ${user.firstName}! Redirecting…`);
    localStorage.setItem('dns_session', JSON.stringify({ id: user.id, name: user.firstName }));
    setTimeout(() => window.location.href = 'index.html', 1500);
  }, 800);
}

/* ════════════════════════════════════
   SIGN UP HANDLER
════════════════════════════════════ */
function handleSignup(e) {
  e.preventDefault();
  const first   = document.getElementById('sFirst').value.trim();
  const last    = document.getElementById('sLast').value.trim();
  const email   = document.getElementById('sEmail').value.trim();
  const phone   = document.getElementById('sPhone').value.trim();
  const pass    = document.getElementById('sPass').value;
  const confirm = document.getElementById('sConfirm').value;
  const terms   = document.getElementById('sTerms').checked;
  const btn     = document.getElementById('signupBtn');

  // Validation
  if (!first || !last || !email || !pass || !confirm) {
    showMsg('signupErr','signupErrTxt','Please fill in all required fields.'); return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showMsg('signupErr','signupErrTxt','Please enter a valid email address.'); return;
  }
  if (pass.length < 8) {
    showMsg('signupErr','signupErrTxt','Password must be at least 8 characters.'); return;
  }
  if (pass !== confirm) {
    showMsg('signupErr','signupErrTxt','Passwords do not match.'); return;
  }
  if (!terms) {
    showMsg('signupErr','signupErrTxt','Please accept the Terms of Service to continue.'); return;
  }
  if (findUser(email)) {
    showMsg('signupErr','signupErrTxt','An account with this email already exists. Please sign in.'); return;
  }

  // Loading
  btn.disabled = true;
  document.getElementById('signupBtnTxt').textContent = 'Creating account…';

  setTimeout(() => {
    btn.disabled = false;
    document.getElementById('signupBtnTxt').textContent = 'Create Account';

    // Save new user
    const users = getUsers();
    const newUser = {
      id:           'u_' + Date.now(),
      firstName:    first,
      lastName:     last,
      email:        email.toLowerCase(),
      phone:        phone,
      passwordHash: hashPass(pass),
      createdAt:    new Date().toISOString()
    };
    users.push(newUser);
    saveUsers(users);
    updateRegCount();

    showMsg('signupOk','signupOkTxt',`Account created! Welcome, ${first}. Switching you to sign in…`);

    // Reset form and switch to login after short delay
    document.getElementById('signupForm').reset();
    document.getElementById('strengthWrap').style.display = 'none';
    setTimeout(() => {
      showView('login');
      document.getElementById('lEmail').value = email;
      showMsg('loginOk','loginOkTxt',`Account ready, ${first}! Enter your password to sign in.`);
    }, 1800);
  }, 900);
}

/* ════════════════════════════════════
   FORGOT PASSWORD
════════════════════════════════════ */
function forgotPassword() {
  const email = document.getElementById('lEmail').value.trim();
  if (!email) {
    showMsg('loginErr','loginErrTxt','Enter your email address above first.');
    document.getElementById('lEmail').focus();
    return;
  }
  const user = findUser(email);
  if (!user && currentRole === 'user') {
    showMsg('loginErr','loginErrTxt','No account found with that email.');
    return;
  }
  showMsg('loginOk','loginOkTxt',`Password reset instructions sent to ${email}`);
}
</script>
